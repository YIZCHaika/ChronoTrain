<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>Départs Saint-Brieuc</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('image_sncf_2.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, sans-serif;

        }
        
        .titre {
            background-image: url('image.png');
            background-repeat: no-repeat;
            background-position: left center;
            background-size: 60px 60px;
            padding-left: 90px;
            padding-right: 90px;
            text-align: center;
            margin-top: 20px;
            margin-left: auto;
            margin-right: auto;
            font-size: 40px;
            font-weight: bold;
            color: black;
            width: fit-content;
        }
        .box {
            background: white;
            border-radius: 20px;
            margin: 50px auto;
            padding: 30px;
            width: fit-content;
            min-width: 600px;
            font-size: 32px;
            color: black;
        }
        .ligne {
            padding: 20px 0;
            border-bottom: 1px solid #ccc;
            display: flex;
            align-items: center;
            gap: 15px; /* Espace entre les éléments */
        }
        .ligne:last-child {
            border-bottom: none;
        }
        .type-train {
            font-weight: bold;
            color: #0055A4; /* Bleu SNCF pour faire ressortir le type */
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="time"></div>

<h1 class="titre">Prochains départs - Saint-Brieuc</h1>

<div id="conteneur" class="box">
    Chargement...
</div>

<div class="logo">
  <img
    src="logo.png"
    style="border-radius: 150px;"
    alt="logo_sacre_coeur"
    width="150"
    height="150"/>

</div>

<script>
const API_KEY = "0fbf3cad-2179-4195-bd01-8ad080fe453b";
const URL = "https://api.sncf.com/v1/coverage/sncf/stop_areas/stop_area:SNCF:87473009/departures";

async function getDepartures() {
    try {
        const response = await fetch(URL, {
            headers: { "Authorization": "Basic " + btoa(API_KEY + ":") }
        });

        const data = await response.json();

        const trains = data.departures.slice(0, 6).map(dep => {
            let heure = dep.stop_date_time.departure_date_time.substring(9, 13);
            heure = heure.substring(0, 2) + ":" + heure.substring(2);

            return {
                heure: heure,
                num: dep.display_informations.headsign,
                dest: dep.display_informations.direction,
                // On récupère le type de train (TER, TGV, etc.)
                type: dep.display_informations.commercial_mode 
            };
        });

        return trains;

    } catch (e) {
        console.error("Erreur API :", e);
        return [];
    }
}

async function updateDisplay() {
    const conteneur = document.getElementById("conteneur");
    conteneur.innerHTML = "Chargement...";

    const trains = await getDepartures();

    if (trains.length === 0) {
        conteneur.innerHTML = "<div>Aucun départ disponible</div>";
        return;
    }

    conteneur.innerHTML = "";

    trains.forEach(t => {
        const div = document.createElement("div");
        div.className = "ligne";
        // On affiche maintenant le type de train dans un <span> dédié
        div.innerHTML = `<span class="heure-train">${t.heure}</span> <span class="type-train">${t.type}</span> <span>${t.num}</span> <span>${t.dest}</span>`;
        conteneur.appendChild(div);
    });
}

// Mise à jour toutes les 30 secondes
updateDisplay();
setInterval(updateDisplay, 30000);
</script>

<script src="javascript.js"></script>

</body>
</html>
